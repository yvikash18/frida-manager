name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release-key.jks

      - name: Build Release APK (signed)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release-key.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --configuration-cache \
            --parallel

      # ── Versioned release (tag push: v*) ──────────────────────────────────
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK for versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APK_DIR="app/build/outputs/apk/release"
          SRC=$(ls -1 $APK_DIR/*.apk | head -n 1)
          mv "$SRC" "$APK_DIR/frida-manager-${{ steps.get_version.outputs.VERSION }}.apk"

      - name: Create versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/frida-manager-${{ steps.get_version.outputs.VERSION }}.apk"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          name: Frida Manager ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Frida Manager ${{ steps.get_version.outputs.VERSION }}

            ### 📥 Downloads
            Download the APK below.

      # ── Rolling latest release (branch push, not a tag) ───────────────────
      - name: Rename APK for rolling release
        if: "!startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'"
        run: |
          APK_DIR="app/build/outputs/apk/release"
          SRC=$(ls -1 $APK_DIR/*.apk | head -n 1)
          mv "$SRC" "$APK_DIR/frida-manager-latest.apk"

      - name: Update rolling latest release
        if: "!startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'"
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/frida-manager-latest.apk"
          tag: latest
          name: "Latest Build"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false
          prerelease: true
          body: |
            **Automated build from the latest commit on `${{ github.ref_name }}`.**

            | Field | Value |
            |---|---|
            | Commit | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | Message | ${{ github.event.head_commit.message }} |
            | Built at | ${{ github.event.head_commit.timestamp }} |

            > This is a rolling pre-release. It is overwritten on every push. For stable builds, see the [versioned releases](${{ github.server_url }}/${{ github.repository }}/releases).
